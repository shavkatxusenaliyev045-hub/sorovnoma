<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Sorovnoma</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="nav-container">
      <div class="nav-logo">🎯 Sorovnoma</div>
      <ul class="nav-links">
        <li class="nav-link" id="nav-home" data-i18n="navbar.home">Home</li>
        <li class="nav-link active" id="nav-dashboard" data-i18n="navbar.dashboard">Dashboard</li>
      </ul>
      <div style="display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap">
        <div class="language-switcher">
          <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>
          <button class="lang-btn" data-lang="uz" onclick="setLanguage('uz')">UZ</button>
          <button class="lang-btn" data-lang="ru" onclick="setLanguage('ru')">РУ</button>
        </div>
        <div class="nav-auth" id="nav-auth"></div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="page">
    <div class="container">
      <!-- Header -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; flex-wrap: wrap; gap: 1rem">
        <div>
          <h1 data-i18n="dashboard.title">Your Dashboard</h1>
          <p style="margin: 0; color: var(--text-secondary)" data-i18n="dashboard.subtitle">Manage your surveys and results</p>
        </div>
        <button class="btn btn-primary" onclick="openCreateSurveyModal()" data-i18n="dashboard.createSurvey">
          ✨ Create New Survey
        </button>
      </div>

      <!-- Surveys List -->
      <section>
        <h2 style="margin-bottom: 2rem" data-i18n="dashboard.mySurveys">My Surveys</h2>
        <div id="surveys-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem">
          <div style="text-align: center; padding: 3rem; color: var(--text-tertiary)" data-i18n="dashboard.noSurveys">
            No surveys created yet. Create your first survey!
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-bottom">
      <p data-i18n="home.footerCopyright">&copy; 2024 Sorovnoma. All rights reserved.</p>
    </div>
  </footer>

  <!-- Create Survey Modal -->
  <div id="create-survey-modal" class="modal-overlay" style="display: none">
    <div class="modal" style="max-width: 600px">
      <h2 data-i18n="dashboard.createSurveyModal">Create New Survey</h2>

      <form id="create-survey-form" style="margin-top: 2rem">
        <div class="form-group">
          <label data-i18n="dashboard.surveyTitleLabel">Survey Title</label>
          <input
            type="text"
            id="survey-title"
            data-field="survey-title"
            data-i18n-placeholder="dashboard.surveyTitleLabel"
            placeholder="Survey Title"
            required
          />
          <div class="form-error"></div>
        </div>

        <div class="form-group">
          <label data-i18n="dashboard.surveyDescLabel">Description (optional)</label>
          <textarea
            id="survey-description"
            data-i18n-placeholder="dashboard.surveyDescLabel"
            placeholder="Description (optional)"
            rows="3"
          ></textarea>
        </div>

        <div id="questions-container" style="margin: 2rem 0; padding: 1.5rem; background: rgba(99, 102, 241, 0.05); border-radius: 12px">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem">
            <h3 style="margin: 0" data-i18n="survey.q1">Questions</h3>
            <button type="button" class="btn btn-primary btn-small" onclick="addQuestion()" data-i18n="dashboard.addQuestion">
              + Add Question
            </button>
          </div>
          <div id="questions-list"></div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem">
          <button type="submit" class="btn btn-primary" data-i18n="dashboard.create">Create Survey</button>
          <button type="button" class="btn btn-secondary" onclick="closeCreateSurveyModal()" data-i18n="dashboard.cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay"></div>

  <script src="app.js"></script>
  <script>
    let currentQuestions = [];

    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth()) return;

      updateLanguageButtons();
      applyTranslations(currentLanguage);

      // Load user surveys
      loadSurveys();

      // Initialize form
      addQuestion();

      // Submit form
      document.getElementById('create-survey-form').addEventListener('submit', (e) => {
        e.preventDefault();
        createSurvey();
      });
    });

    function updateLanguageButtons() {
      document.querySelectorAll('.lang-btn').forEach((btn) => {
        btn.classList.remove('active');
        if (btn.dataset.lang === currentLanguage) {
          btn.classList.add('active');
        }
      });
    }

    const originalSetLanguage = window.setLanguage;
    window.setLanguage = function (lang) {
      originalSetLanguage(lang);
      updateLanguageButtons();
      loadSurveys();
    };

    function loadSurveys() {
      const surveys = SurveyDB.getSurveysByHost(AppState.currentUser.email);
      const surveysList = document.getElementById('surveys-list');

      if (surveys.length === 0) {
        surveysList.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-tertiary)" data-i18n="dashboard.noSurveys">
          No surveys created yet. Create your first survey!
        </div>`;
        return;
      }

      surveysList.innerHTML = surveys
        .map((survey) => {
          const stats = SubmissionDB.getStats(survey.id);
          return `
            <div class="survey-card card card-glass">
              <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem">
                <div>
                  <h3>${survey.title}</h3>
                  <p style="font-size: 0.9rem; color: var(--text-tertiary); margin: 0">${survey.description || ''}</p>
                </div>
                <span class="status-badge status-${survey.status}">${getTranslation(`dashboard.${survey.status}`)}</span>
              </div>

              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; padding: 1rem 0; border-top: 1px solid rgba(148, 163, 184, 0.1); border-bottom: 1px solid rgba(148, 163, 184, 0.1)">
                <div>
                  <p style="font-size: 0.85rem; color: var(--text-tertiary); margin: 0">${getTranslation('survey.questions')}</p>
                  <p style="font-size: 1.2rem; font-weight: 600; color: var(--primary); margin: 0">${survey.questions.length}</p>
                </div>
                <div>
                  <p style="font-size: 0.85rem; color: var(--text-tertiary); margin: 0">${getTranslation('survey.participants')}</p>
                  <p style="font-size: 1.2rem; font-weight: 600; color: var(--secondary); margin: 0">${survey.participants.length}</p>
                </div>
              </div>

              <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem">
                <button class="btn btn-primary btn-small" onclick="openLobby('${survey.id}')">
                  ${getTranslation('dashboard.openLobby')}
                </button>
                <button class="btn btn-secondary btn-small" onclick="viewResults('${survey.id}')">
                  ${getTranslation('dashboard.viewResults')}
                </button>
                <button class="btn btn-secondary btn-small" onclick="deleteSurvey('${survey.id}')" style="color: var(--error); border-color: var(--error)">
                  ${getTranslation('dashboard.delete')}
                </button>
              </div>
            </div>
          `;
        })
        .join('');
    }

    function openCreateSurveyModal() {
      document.getElementById('create-survey-modal').style.display = 'flex';
      currentQuestions = [];
      addQuestion();
    }

    function closeCreateSurveyModal() {
      document.getElementById('create-survey-modal').style.display = 'none';
    }

    function addQuestion() {
      const questionId = 'q_' + Date.now() + '_' + Math.random();
      const questionsListDiv = document.getElementById('questions-list');

      const questionDiv = document.createElement('div');
      questionDiv.id = `question-${questionId}`;
      questionDiv.className = 'question-item';
      questionDiv.style.cssText = `
        margin-bottom: 1rem;
        padding: 1rem;
        background: rgba(30, 41, 59, 0.5);
        border-radius: 8px;
        border: 1px solid rgba(99, 102, 241, 0.2);
      `;

      questionDiv.innerHTML = `
        <div style="display: grid; grid-template-columns: 1fr auto; gap: 1rem; margin-bottom: 1rem">
          <input
            type="text"
            data-question-id="${questionId}"
            data-field="question-text"
            class="question-text-input"
            placeholder="Enter your question"
            style="padding: 0.75rem; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 8px; color: var(--text-primary)"
          />
          <select
            data-question-id="${questionId}"
            data-field="question-type"
            class="question-type-select"
            style="padding: 0.75rem; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 8px; color: var(--text-primary); min-width: 150px"
          >
            <option value="radio">${getTranslation('dashboard.multipleChoice')}</option>
            <option value="checkbox">${getTranslation('dashboard.checkboxes')}</option>
            <option value="rating">${getTranslation('dashboard.rating')}</option>
            <option value="text">${getTranslation('dashboard.shortText')}</option>
            <option value="dropdown">${getTranslation('dashboard.dropdown')}</option>
          </select>
          <button type="button" class="btn btn-secondary btn-small" onclick="removeQuestion('${questionId}')" style="color: var(--error)">
            ${getTranslation('dashboard.removeQuestion')}
          </button>
        </div>
      `;

      questionsListDiv.appendChild(questionDiv);
      currentQuestions.push(questionId);
    }

    function removeQuestion(questionId) {
      document.getElementById(`question-${questionId}`).remove();
      currentQuestions = currentQuestions.filter((id) => id !== questionId);
    }

    function createSurvey() {
      const title = document.getElementById('survey-title').value.trim();
      const description = document.getElementById('survey-description').value.trim();

      if (!title) {
        Toast.error(getTranslation('errors.surveyTitle'));
        return;
      }

      const questions = [];
      currentQuestions.forEach((questionId) => {
        const textInput = document.querySelector(`input[data-question-id="${questionId}"]`);
        const typeSelect = document.querySelector(`select[data-question-id="${questionId}"]`);

        if (textInput && textInput.value.trim()) {
          questions.push({
            id: questionId,
            type: typeSelect.value,
            text: textInput.value.trim(),
          });
        }
      });

      if (questions.length === 0) {
        Toast.error(getTranslation('errors.atLeastOneQuestion'));
        return;
      }

      const survey = SurveyDB.createSurvey(AppState.currentUser.email, AppState.currentUser.name, title, description, questions);

      Toast.success(getTranslation('toast.surveyCreated'));
      closeCreateSurveyModal();

      // Reset form
      document.getElementById('create-survey-form').reset();
      currentQuestions = [];

      loadSurveys();
    }

    function openLobby(surveyId) {
      window.location.href = `survey.html?host=${surveyId}`;
    }

    function viewResults(surveyId) {
      window.location.href = `survey.html?results=${surveyId}`;
    }

    function deleteSurvey(surveyId) {
      if (confirm('Are you sure you want to delete this survey?')) {
        SurveyDB.deleteSurvey(surveyId);
        Toast.info('Survey deleted');
        loadSurveys();
      }
    }
  </script>
</body>
</html>
