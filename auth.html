<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Sign Up - Sorovnoma</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="nav-container">
      <div class="nav-logo">🎯 Sorovnoma</div>
      <div style="flex: 1"></div>
      <div class="language-switcher">
        <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" data-lang="uz" onclick="setLanguage('uz')">UZ</button>
        <button class="lang-btn" data-lang="ru" onclick="setLanguage('ru')">РУ</button>
      </div>
      <a href="index.html" class="nav-link" data-i18n="auth.backToHome">Back to Home</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="page" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 200px)">
    <div style="width: 100%; max-width: 450px; padding: 2rem">
      <!-- Auth Container -->
      <div class="glass" style="padding: 3rem; border-radius: 24px">
        <!-- Tabs -->
        <div
          style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
          "
        >
          <button
            class="btn-tab active"
            id="tab-login"
            onclick="switchTab('login')"
            style="
              background: transparent;
              border: 2px solid transparent;
              border-bottom: 2px solid var(--primary);
              color: var(--primary);
              padding: 0.75rem;
              font-weight: 600;
              transition: all var(--transition-base);
            "
            data-i18n="auth.login"
          >
            Login
          </button>
          <button
            class="btn-tab"
            id="tab-signup"
            onclick="switchTab('signup')"
            style="
              background: transparent;
              border: 2px solid transparent;
              color: var(--text-secondary);
              padding: 0.75rem;
              font-weight: 600;
              transition: all var(--transition-base);
            "
            data-i18n="auth.signup"
          >
            Sign Up
          </button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form" style="display: block">
          <h2 style="text-align: center; margin-bottom: 2rem" data-i18n="auth.welcomeBack">Welcome Back</h2>

          <div class="form-group">
            <label data-i18n="auth.email">Email Address</label>
            <input
              type="email"
              id="login-email"
              data-field="login-email"
              data-i18n-placeholder="auth.emailPlaceholder"
              placeholder="you@example.com"
              required
            />
            <div class="form-error"></div>
          </div>

          <div class="form-group">
            <label data-i18n="auth.password">Password</label>
            <input
              type="password"
              id="login-password"
              data-field="login-password"
              data-i18n-placeholder="auth.passwordPlaceholder"
              placeholder="••••••••"
              required
            />
            <div class="form-error"></div>
          </div>

          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem">
            <label style="display: flex; align-items: center; margin: 0; font-weight: 400" data-i18n="auth.rememberMe">
              <input
                type="checkbox"
                id="remember-me"
                style="width: 18px; height: 18px; margin-right: 0.5rem"
              />
              Remember me
            </label>
            <a href="#" style="font-size: 0.9rem; color: var(--primary)" data-i18n="auth.forgotPassword">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem" data-i18n="auth.signIn">
            Sign In
          </button>

          <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem">
            <span data-i18n="auth.dontHaveAccount">Don't have an account?</span>
            <a href="#" onclick="switchTab('signup')" style="color: var(--primary); font-weight: 600" data-i18n="auth.createOne">
              Create one
            </a>
          </p>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="auth-form" style="display: none">
          <h2 style="text-align: center; margin-bottom: 2rem" data-i18n="auth.createAccount">Create Account</h2>

          <div class="form-group">
            <label data-i18n="auth.fullName">Full Name</label>
            <input
              type="text"
              id="signup-fullname"
              data-field="signup-fullname"
              data-i18n-placeholder="auth.fullNamePlaceholder"
              placeholder="John Doe"
              required
            />
            <div class="form-error"></div>
          </div>

          <div class="form-group">
            <label data-i18n="auth.email">Email Address</label>
            <input
              type="email"
              id="signup-email"
              data-field="signup-email"
              data-i18n-placeholder="auth.emailPlaceholder"
              placeholder="you@example.com"
              required
            />
            <div class="form-error"></div>
          </div>

          <div class="form-group">
            <label data-i18n="auth.password">Password</label>
            <input
              type="password"
              id="signup-password"
              data-field="signup-password"
              data-i18n-placeholder="auth.passwordPlaceholder"
              placeholder="••••••••"
              required
            />
            <div class="password-strength">
              <div class="password-strength-bar" id="password-strength-bar"></div>
            </div>
            <div class="password-strength-text" id="password-strength-text" data-i18n="auth.passwordMin">
              At least 8 characters
            </div>
            <div class="form-error"></div>
          </div>

          <div class="form-group">
            <label data-i18n="auth.confirmPassword">Confirm Password</label>
            <input
              type="password"
              id="signup-confirm"
              data-field="signup-confirm"
              data-i18n-placeholder="auth.passwordPlaceholder"
              placeholder="••••••••"
              required
            />
            <div class="form-error"></div>
          </div>

          <div style="display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 2rem">
            <input
              type="checkbox"
              id="terms"
              style="width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0"
              required
            />
            <label style="font-weight: 400; margin: 0" data-i18n="auth.agreeTerms">
              I agree to the Terms of Service and Privacy Policy
            </label>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem" data-i18n="auth.signup">
            Create Account
          </button>

          <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem">
            <span data-i18n="auth.alreadyHave">Already have an account?</span>
            <a href="#" onclick="switchTab('login')" style="color: var(--primary); font-weight: 600" data-i18n="auth.login">
              Sign in
            </a>
          </p>
        </form>
      </div>

      <!-- Trust Indicators -->
      <div style="margin-top: 2rem; text-align: center; color: var(--text-tertiary); font-size: 0.9rem">
        <p><span data-i18n="auth.secure">🔐 Secure</span> • <span data-i18n="auth.fast">🚀 Fast</span> • <span data-i18n="auth.reliable">📊 Reliable</span></p>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay"></div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateLanguageButtons();
      applyTranslations(currentLanguage);
    });

    function updateLanguageButtons() {
      document.querySelectorAll('.lang-btn').forEach((btn) => {
        btn.classList.remove('active');
        if (btn.dataset.lang === currentLanguage) {
          btn.classList.add('active');
        }
      });
    }

    // Override setLanguage to update buttons
    const originalSetLanguage = window.setLanguage;
    window.setLanguage = function (lang) {
      originalSetLanguage(lang);
      updateLanguageButtons();
    };

    // Tab switching
    function switchTab(tab) {
      // Update buttons
      const loginTab = document.getElementById('tab-login');
      const signupTab = document.getElementById('tab-signup');

      if (tab === 'login') {
        loginTab.style.borderBottomColor = 'var(--primary)';
        loginTab.style.color = 'var(--primary)';
        signupTab.style.borderBottomColor = 'transparent';
        signupTab.style.color = 'var(--text-secondary)';

        document.getElementById('login-form').style.display = 'block';
        document.getElementById('signup-form').style.display = 'none';
      } else {
        loginTab.style.borderBottomColor = 'transparent';
        loginTab.style.color = 'var(--text-secondary)';
        signupTab.style.borderBottomColor = 'var(--primary)';
        signupTab.style.color = 'var(--primary)';

        document.getElementById('login-form').style.display = 'none';
        document.getElementById('signup-form').style.display = 'block';
      }

      FormValidator.clearErrors();
    }

    // Password strength indicator
    document.getElementById('signup-password')?.addEventListener('input', (e) => {
      const password = e.target.value;
      const strength = Auth.getPasswordStrength(password);
      const bar = document.getElementById('password-strength-bar');
      const text = document.getElementById('password-strength-text');

      bar.classList.remove('weak', 'fair', 'strong');
      bar.classList.add(strength);

      if (strength === 'weak') {
        text.textContent = getTranslation('auth.passwordWeak');
      } else if (strength === 'fair') {
        text.textContent = getTranslation('auth.passwordFair');
      } else {
        text.textContent = getTranslation('auth.passwordStrong');
      }
    });

    // Login form submission
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      FormValidator.clearErrors();

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      const result = Auth.signin(email, password);

      if (result.success) {
        Toast.success(getTranslation('toast.loggedIn'));
        setTimeout(() => {
          const returnUrl = AppState.returnUrl;
          sessionStorage.removeItem('returnUrl');
          window.location.href = returnUrl || 'dashboard.html';
        }, 500);
      } else {
        Object.entries(result.errors).forEach(([field, message]) => {
          FormValidator.showError(field === 'email' ? 'login-email' : 'login-password', message);
        });
      }
    });

    // Signup form submission
    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      FormValidator.clearErrors();

      const fullName = document.getElementById('signup-fullname').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const confirmPassword = document.getElementById('signup-confirm').value;

      // Validate password match
      if (password !== confirmPassword) {
        FormValidator.showError('signup-confirm', getTranslation('errors.passwordMismatch'));
        return;
      }

      // Validate terms
      if (!document.getElementById('terms').checked) {
        Toast.error(getTranslation('errors.agreeTerms'));
        return;
      }

      const result = Auth.signup(fullName, email, password);

      if (result.success) {
        Toast.success(getTranslation('toast.accountCreated'));
        setTimeout(() => {
          const returnUrl = AppState.returnUrl;
          sessionStorage.removeItem('returnUrl');
          window.location.href = returnUrl || 'index.html';
        }, 500);
      } else {
        Object.entries(result.errors).forEach(([field, message]) => {
          FormValidator.showError(`signup-${field}`, message);
        });
      }
    });

    // Initialize
    window.addEventListener('load', () => {
      updateNavbar();
    });
  </script>
</body>
</html>
